version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: herbaludyog_db
    env_file:
      - ./server/.env
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-herbaludyog}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
